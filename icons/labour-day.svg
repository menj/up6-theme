<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
  <!-- ═══ WRENCH — horizontal, behind fist ═══ -->
  <!-- Wrench handle -->
  <rect x="1" y="7.8" width="18" height="2.8" rx=".8" fill="#607d8b"/>
  <!-- Handle hole -->
  <circle cx="3" cy="9.2" r=".7" fill="#fff" opacity=".6"/>
  <!-- Wrench jaw — open C-shape on right -->
  <path d="M19 6.5c2.5 0 4.5 1.2 4.5 3s-2 3-4.5 3h-1V6.5z" fill="#607d8b"/>
  <!-- Jaw opening cutout -->
  <path d="M19 8c1.5 0 2.8.5 2.8 1.3s-1.3 1.3-2.8 1.3" fill="#fff" opacity=".15"/>
  <path d="M20 8.2c1 0 2 .4 2 1s-1 1-2 1" fill="none" stroke="#4a6572" stroke-width=".3"/>
  <!-- Handle darker edge -->
  <rect x="1" y="10" width="18" height=".6" rx=".2" fill="#4a6572" opacity=".4"/>

  <!-- ═══ FIST — gripping wrench ═══ -->
  <!-- Wrist / arm coming from below -->
  <rect x="7.5" y="14" width="7" height="9" rx="1" fill="#f0c882"/>
  <rect x="8.2" y="14" width="5.6" height="9" rx=".8" fill="#e8bc70" opacity=".4"/>

  <!-- Palm block behind wrench -->
  <rect x="7" y="8" width="8" height="6.5" rx="1.5" fill="#f0c882"/>
  <rect x="7.5" y="9" width="7" height="5" rx="1" fill="#e8bc70" opacity=".3"/>

  <!-- Four fingers curled over wrench from above -->
  <!-- Index finger -->
  <rect x="8" y="4.5" width="2" height="5" rx=".9" fill="#f5d494"/>
  <rect x="8" y="6.5" width="2" height="3" rx=".8" fill="#e8bc70" opacity=".5"/>
  <!-- Middle finger -->
  <rect x="10" y="4" width="2" height="5.5" rx=".9" fill="#f0c882"/>
  <rect x="10" y="6" width="2" height="3.5" rx=".8" fill="#e8bc70" opacity=".5"/>
  <!-- Ring finger -->
  <rect x="12" y="4.5" width="2" height="5" rx=".9" fill="#f5d494"/>
  <rect x="12" y="6.5" width="2" height="3" rx=".8" fill="#e8bc70" opacity=".5"/>
  <!-- Pinky finger -->
  <rect x="13.8" y="5.2" width="1.8" height="4.3" rx=".8" fill="#f0c882"/>
  <rect x="13.8" y="6.8" width="1.8" height="2.7" rx=".7" fill="#e8bc70" opacity=".5"/>

  <!-- Fingertip curls — knuckle row -->
  <rect x="7.8" y="7.5" width="8" height="2.5" rx="1" fill="#e8bc70"/>
  <!-- Nail highlights -->
  <ellipse cx="9" cy="5.5" rx=".6" ry=".4" fill="#fff" opacity=".25"/>
  <ellipse cx="11" cy="5" rx=".6" ry=".4" fill="#fff" opacity=".25"/>
  <ellipse cx="13" cy="5.5" rx=".6" ry=".4" fill="#fff" opacity=".25"/>

  <!-- Thumb — wraps in front across palm -->
  <path d="M7 10c-.8 0-1.5.5-1.5 1.3 0 .8.5 1.3 1.2 1.3l2 .2v-3z" fill="#f5d494"/>
  <!-- Thumb crease -->
  <path d="M8 10.5c-.8.3-1.2.8-1 1.3" fill="none" stroke="#d4a060" stroke-width=".3" opacity=".6"/>
  <!-- Thumb-palm connection line -->
  <path d="M8.5 10.5c-.5 1-1 2.5-.5 3.5" stroke="#d4a060" stroke-width=".35" fill="none" opacity=".5"/>
</svg>
