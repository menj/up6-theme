<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
  <!-- ═══ GOLD CRESCENT — opens to the right ═══ -->
  <!-- Crescent shape: outer arc large, inner arc shifted right -->
  <path d="M15 2
           A10 10 0 1 0 15 22
           A7.5 7.5 0 1 1 15 2z"
        fill="#c8a030"/>
  <!-- Lighter inner layer for gold gradient -->
  <path d="M14.5 3
           A9.3 9.3 0 1 0 14.5 21
           A7 7 0 1 1 14.5 3z"
        fill="#d4a017" opacity=".5"/>
  <!-- Bright edge highlight on outer curve -->
  <path d="M14.8 2.5
           A9.8 9.8 0 1 0 14.8 21.5"
        fill="none" stroke="#e8c340" stroke-width=".4" opacity=".45"/>

  <!-- ═══ ARABIC CALLIGRAPHY محمد ═══ -->
  <text x="14" y="15.5"
        font-family="'Traditional Arabic','Simplified Arabic','Noto Naskh Arabic','Scheherazade',serif"
        font-size="10.5" font-weight="700"
        fill="#8b6e14"
        text-anchor="middle"
        direction="rtl" unicode-bidi="bidi-override"
        opacity=".85">محمد</text>
  <!-- Gold sheen overlay -->
  <text x="14" y="15.5"
        font-family="'Traditional Arabic','Simplified Arabic','Noto Naskh Arabic','Scheherazade',serif"
        font-size="10.5" font-weight="700"
        fill="#d4a017"
        text-anchor="middle"
        direction="rtl" unicode-bidi="bidi-override"
        opacity=".25">محمد</text>
</svg>
