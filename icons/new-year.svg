<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
  <!-- Calendar body — white with rounded corners -->
  <rect x="2" y="3" width="20" height="19" rx="2" fill="#fff"/>
  <rect x="2" y="3" width="20" height="19" rx="2" fill="none" stroke="#2e5871" stroke-width=".6"/>

  <!-- Red header bar -->
  <rect x="2" y="3" width="20" height="6.5" rx="2" fill="#cc2222"/>
  <rect x="2" y="7" width="20" height="2.5" fill="#cc2222"/>

  <!-- Month text — JAN -->
  <text x="12" y="8.5" font-family="'DM Sans',sans-serif" font-size="4.5" font-weight="900" fill="#fff" text-anchor="middle" letter-spacing=".3">JAN</text>

  <!-- Divider line -->
  <line x1="3" y1="9.5" x2="21" y2="9.5" stroke="#e0e0e0" stroke-width=".3"/>

  <!-- Day number — 1 -->
  <text x="12" y="19.5" font-family="'DM Sans',sans-serif" font-size="10" font-weight="900" fill="#1B3C53" text-anchor="middle">1</text>

  <!-- Calendar ring holes -->
  <circle cx="6.5" cy="3" r="1" fill="#fff"/>
  <rect x="6" y="1" width="1" height="3" rx=".4" fill="#2e5871"/>
  <circle cx="17.5" cy="3" r="1" fill="#fff"/>
  <rect x="17" y="1" width="1" height="3" rx=".4" fill="#2e5871"/>

  <!-- Subtle shadow on white area -->
  <rect x="3" y="10" width="18" height="11" rx="1" fill="#f8f8f8" opacity=".5"/>

  <!-- Small confetti / celebration dots -->
  <circle cx="4.5" cy="13" r=".5" fill="#d4a017" opacity=".7"/>
  <circle cx="19.5" cy="14" r=".5" fill="#cc2222" opacity=".6"/>
  <circle cx="5" cy="18" r=".4" fill="#2d6a4f" opacity=".5"/>
  <circle cx="19" cy="17.5" r=".45" fill="#d4a017" opacity=".6"/>
</svg>
