<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
  <!-- Vel blade — large teardrop/leaf shape -->
  <path d="M12 1C9.5 5 8 8 8 10.5c0 3 1.8 4.5 4 4.5s4-1.5 4-4.5C16 8 14.5 5 12 1z" fill="#e8a020"/>
  <!-- Lighter inner highlight -->
  <path d="M12 2.5c-2 3.5-3 6-3 8 0 2.2 1.3 3.5 3 3.5s3-1.3 3-3.5c0-2-1-4.5-3-8z" fill="#f0b830" opacity=".7"/>
  <!-- Sacred marks — three horizontal white lines (Thiruman) -->
  <line x1="10.5" y1="6" x2="13.5" y2="6" stroke="#fff" stroke-width=".6" stroke-linecap="round"/>
  <line x1="10.2" y1="7.2" x2="13.8" y2="7.2" stroke="#fff" stroke-width=".6" stroke-linecap="round"/>
  <line x1="10" y1="8.4" x2="14" y2="8.4" stroke="#fff" stroke-width=".6" stroke-linecap="round"/>
  <!-- Decorative scroll — left curl -->
  <path d="M9.5 11c-1.2-.5-2 0-2 .8s.8 1.2 1.5.8" fill="none" stroke="#c88510" stroke-width=".7" stroke-linecap="round"/>
  <path d="M7.8 11.8c.3-.5.8-.5 1 0" fill="none" stroke="#e8a020" stroke-width=".4"/>
  <!-- Decorative scroll — right curl -->
  <path d="M14.5 11c1.2-.5 2 0 2 .8s-.8 1.2-1.5.8" fill="none" stroke="#c88510" stroke-width=".7" stroke-linecap="round"/>
  <path d="M16.2 11.8c-.3-.5-.8-.5-1 0" fill="none" stroke="#e8a020" stroke-width=".4"/>
  <!-- Small point at blade bottom -->
  <path d="M11.3 14.5L12 15.8l.7-1.3z" fill="#c88510"/>
  <!-- Blade outline accent -->
  <path d="M12 1C9.5 5 8 8 8 10.5c0 3 1.8 4.5 4 4.5s4-1.5 4-4.5C16 8 14.5 5 12 1z" fill="none" stroke="#b87a08" stroke-width=".3"/>

  <!-- Red ornamental collar -->
  <ellipse cx="12" cy="16.5" rx="2" ry=".9" fill="#cc2222"/>
  <ellipse cx="12" cy="16.5" rx="2" ry=".9" fill="none" stroke="#a01818" stroke-width=".2"/>
  <ellipse cx="12" cy="16.5" rx="1.3" ry=".5" fill="#e03030" opacity=".6"/>
  <!-- Lower collar -->
  <ellipse cx="12" cy="17.3" rx="1.5" ry=".6" fill="#a01818"/>
  <ellipse cx="12" cy="17.3" rx="1" ry=".35" fill="#cc2222" opacity=".5"/>

  <!-- Shaft -->
  <rect x="11.2" y="17.5" width="1.6" height="5.5" rx=".5" fill="#6b4510"/>
  <rect x="11.6" y="17.5" width=".8" height="5.5" rx=".3" fill="#8b5e1a" opacity=".6"/>
  <!-- Shaft band -->
  <rect x="11" y="19.5" width="2" height=".4" rx=".15" fill="#d4a017"/>
</svg>
